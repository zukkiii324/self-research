name: Deploy Publish Site

on:
  push:
    paths:
      - 'content/**'
      - 'scripts/build_publish_site.py'
      - 'config/topic_catalog.json'
      - 'src/note_team/**'
      - '.github/workflows/deploy_static_blog.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Build publish site
        run: |
          python scripts/build_publish_site.py
      - name: Deploy publish_site to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_dir: ./publish_site
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          keep_history: true
