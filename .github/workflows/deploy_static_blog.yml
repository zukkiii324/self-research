name: Deploy Static Blog

on:
  push:
    paths:
      - 'content/**'
      - 'scripts/build_static_blog.py'
      - 'static_blog_site/**'
      - '.github/workflows/deploy_static_blog.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs
      - name: Build static blog
        run: |
          python scripts/build_static_blog.py
          mkdocs build --site-dir site --config-file static_blog_site/mkdocs.yml
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_dir: ./site
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          keep_history: true
